version: "3.8"

services:
  tecnihidros-db:
    image: mysql:8.0
    container_name: tecnihidros_mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: tecnihidros_bd
      MYSQL_USER: tecnihidros
      MYSQL_PASSWORD: tecnihidros123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  tecnihidros-admin:
    image: phpmyadmin:latest
    container_name: tecnihidros_phpmyadmin
    restart: always

    depends_on:
      - tecnihidros-db

    ports:
      - "8080:80"

    environment:
      PMA_HOST: tecnihidros-db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password_123

volumes:
  mysql_data: